spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Ecommerce_staging}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 3600000

  seed-data: false

logging:
  level:
    com.project.ecommercebackend: INFO
    org.springframework.security: WARN

management:
  endpoint:
    health:
      show-details: when-authorized
